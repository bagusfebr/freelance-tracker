        function App() {
            // Screen / Navigation states: 'dashboard', 'planner', 'metrics', 'rules', 'timer'
            const [currentTab, setCurrentTab] = useState('dashboard');
            const [selectedDay, setSelectedDay] = useState(1);
            
            // Checkboxes state
            const [taskChecks, setTaskChecks] = useState(() => {
                try {
                    const saved = localStorage.getItem('rezeki_2026_tasks');
                    return saved ? JSON.parse(saved) : {};
                } catch (e) {
                    return {};
                }
            });

            // Output checks state
            const [outputChecks, setOutputChecks] = useState(() => {
                try {
                    const saved = localStorage.getItem('rezeki_2026_outputs');
                    return saved ? JSON.parse(saved) : {};
                } catch (e) {
                    return {};
                }
            });

            // Metric tracking (numerical) per day
            const [metricsData, setMetricsData] = useState(() => {
                try {
                    const saved = localStorage.getItem('rezeki_2026_metrics_v2');
                    if (saved) return JSON.parse(saved);
                } catch (e) {}
                
                // default structure empty for days 1-7
                const initial = {};
                for (let i = 1; i <= 7; i++) {
                    initial[i] = {
                        outreach: 0,
                        reply: 0,
                        meeting: 0,
                        proposal: 0,
                        deal: 0,
                        lamaran: 0,
                        response: 0,
                        interview: 0,
                        offer: 0,
                        amirayaStatus: false,
                        notes: ''
                    };
                }
                return initial;
            });

            // NEW robust, background-friendly persistent timer state
            const [timerState, setTimerState] = useState(() => {
                try {
                    const saved = localStorage.getItem('rezeki_2026_timer_state_v3');
                    if (saved) {
                        return JSON.parse(saved);
                    }
                } catch (e) {}
                return {
                    isRunning: false,
                    activeType: 'freelance', // freelance, jobsearch, amiraya
                    startTime: null,          // Timestamp of when active run started
                    accumulated: { freelance: 0, jobsearch: 0, amiraya: 0 } // In seconds
                };
            });

            // State to trigger state updates visually in UI when active
            const [now, setNow] = useState(Date.now());

            const [iosInstallPrompt, setIosInstallPrompt] = useState(false);

            // Sync task checklists and metric logs to local storage
            useEffect(() => {
                localStorage.setItem('rezeki_2026_tasks', JSON.stringify(taskChecks));
            }, [taskChecks]);

            useEffect(() => {
                localStorage.setItem('rezeki_2026_outputs', JSON.stringify(outputChecks));
            }, [outputChecks]);

            useEffect(() => {
                localStorage.setItem('rezeki_2026_metrics_v2', JSON.stringify(metricsData));
            }, [metricsData]);

            // Sync background timer to local storage
            useEffect(() => {
                localStorage.setItem('rezeki_2026_timer_state_v3', JSON.stringify(timerState));
            }, [timerState]);

            // Handle browser ticking when active
            useEffect(() => {
                let interval = null;
                if (timerState.isRunning) {
                    interval = setInterval(() => {
                        setNow(Date.now());
                    }, 500);
                }
                return () => clearInterval(interval);
            }, [timerState.isRunning]);

            // Listen to browser tab visibility changes & focus events to force calculations instantly
            useEffect(() => {
                const handleActivitySync = () => {
                    if (document.visibilityState === 'visible') {
                        setNow(Date.now());
                    }
                };
                window.addEventListener('visibilitychange', handleActivitySync);
                window.addEventListener('focus', handleActivitySync);
                return () => {
                    window.removeEventListener('visibilitychange', handleActivitySync);
                    window.removeEventListener('focus', handleActivitySync);
                };
            }, []);

            // Check if opened as standalone or check iOS Safari
            useEffect(() => {
                const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
                const isIos = /iPhone|iPad|iPod/.test(navigator.userAgent);
                if (!isStandalone && isIos) {
                    // Show custom installation card
                    setIosInstallPrompt(true);
                }
            }, []);

            // Helper to get exact, true elapsed seconds (even when backgrounded)
            const getLiveSeconds = (type) => {
                if (timerState.isRunning && timerState.activeType === type && timerState.startTime) {
                    const diff = Math.floor((now - timerState.startTime) / 1000);
                    return timerState.accumulated[type] + (diff > 0 ? diff : 0);
                }
                return timerState.accumulated[type] || 0;
            };

            // Timer actions
            const startTimer = () => {
                setTimerState(prev => {
                    if (prev.isRunning) return prev;
                    return {
                        ...prev,
                        isRunning: true,
                        startTime: Date.now()
                    };
                });
                setNow(Date.now());
            };

            const pauseTimer = () => {
                setTimerState(prev => {
                    if (!prev.isRunning) return prev;
                    const diff = Math.floor((Date.now() - prev.startTime) / 1000);
                    const newAccumulated = { ...prev.accumulated };
                    newAccumulated[prev.activeType] += (diff > 0 ? diff : 0);
                    return {
                        ...prev,
                        isRunning: false,
                        startTime: null,
                        accumulated: newAccumulated
                    };
                });
            };

            const resetTimer = () => {
                setTimerState(prev => {
                    const newAccumulated = { ...prev.accumulated };
                    newAccumulated[prev.activeType] = 0;
                    return {
                        ...prev,
                        isRunning: false,
                        startTime: null,
                        accumulated: newAccumulated
                    };
                });
            };

            const changeTimerType = (newType) => {
                setTimerState(prev => {
                    let newAccumulated = { ...prev.accumulated };
                    // If switching while running, commit current runtime to prev type first
                    if (prev.isRunning && prev.startTime) {
                        const diff = Math.floor((Date.now() - prev.startTime) / 1000);
                        newAccumulated[prev.activeType] += (diff > 0 ? diff : 0);
                    }
                    return {
                        ...prev,
                        activeType: newType,
                        isRunning: false, // Paused initially on switch for clarity
                        startTime: null,
                        accumulated: newAccumulated
                    };
                });
                setNow(Date.now());
            };

            // Sum metrics for Weekly Progress calculations
            const getCumulativeMetrics = () => {
                const total = {
                    outreach: 0,
                    reply: 0,
                    meeting: 0,
                    proposal: 0,
                    deal: 0,
                    lamaran: 0,
                    response: 0,
                    interview: 0,
                    offer: 0
                };
                Object.values(metricsData).forEach(day => {
                    total.outreach += Number(day.outreach || 0);
                    total.reply += Number(day.reply || 0);
                    total.meeting += Number(day.meeting || 0);
                    total.proposal += Number(day.proposal || 0);
                    total.deal += Number(day.deal || 0);
                    total.lamaran += Number(day.lamaran || 0);
                    total.response += Number(day.response || 0);
                    total.interview += Number(day.interview || 0);
                    total.offer += Number(day.offer || 0);
                });
                return total;
            };

            const cumulative = getCumulativeMetrics();

            // Toggle tasks functions
            const toggleTask = (dayId, type, index) => {
                const key = `${dayId}_${type}_${index}`;
                setTaskChecks(prev => ({ ...prev, [key]: !prev[key] }));
            };

            const toggleOutput = (dayId, index) => {
                const key = `${dayId}_out_${index}`;
                setOutputChecks(prev => ({ ...prev, [key]: !prev[key] }));
            };

            // Calculate progress of current day's checklist
            const getDayProgress = (dayNum) => {
                const day = PLAN_DATA.harian[dayNum];
                if (!day) return 0;
                
                const totalTasks = day.freelance.length + day.jobSearch.length + day.output.length;
                let completed = 0;

                day.freelance.forEach((_, i) => {
                    if (taskChecks[`${dayNum}_freelance_${i}`]) completed++;
                });
                day.jobSearch.forEach((_, i) => {
                    if (taskChecks[`${dayNum}_jobSearch_${i}`]) completed++;
                });
                day.output.forEach((_, i) => {
                    if (outputChecks[`${dayNum}_out_${i}`]) completed++;
                });

                return totalTasks === 0 ? 0 : Math.round((completed / totalTasks) * 100);
            };

            // Format Timer Duration (hh:mm:ss)
            const formatTime = (totalSec) => {
                const hrs = Math.floor(totalSec / 3600);
                const mins = Math.floor((totalSec % 3600) / 60);
                const secs = totalSec % 60;
                return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            return (
                <div className="flex flex-col h-full bg-[#F2F2F7] safe-top safe-bottom relative overflow-hidden">
                    
                    {/* Apple Style Top Header */}
                    <header className="bg-white/80 backdrop-blur-md border-b border-gray-200 sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
                        <div>

                            <h1 className="text-2xl font-extrabold text-gray-900 tracking-tight flex items-center gap-1.5">
                                REZEKI 2026 <span className="bg-red-500 text-white text-[10px] font-semibold px-2 py-0.5 rounded-full uppercase tracking-wider animate-pulse">Action</span>
                            </h1>
                        </div>
                        <div className="flex items-center gap-2">
                            {/* Live Target Status Pill */}
                            <div className="bg-emerald-50 text-emerald-700 text-xs px-3 py-1.5 rounded-full font-bold border border-emerald-100 flex items-center gap-1">
                                <span className="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                Live Tracker
                            </div>
                        </div>
                    </header>

                    {/* Main Content Area - Scrollable */}
                    <main className="flex-1 overflow-y-auto px-4 py-4 space-y-5 pb-24">

                        {/* Custom Banner For Safari Installer */}
                        {iosInstallPrompt && (
                            <div className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-2xl p-4 shadow-lg relative overflow-hidden flex flex-col justify-between">
                                <button onClick={() => setIosInstallPrompt(false)} className="absolute right-3 top-3 bg-white/10 hover:bg-white/20 p-1.5 rounded-full text-white">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                                </button>
                                <div className="pr-8">
                                    <h4 className="font-extrabold text-base mb-1">Pasang Sebagai App di iPhone</h4>
                                    <p className="text-xs text-blue-50/90 leading-relaxed mb-3">
                                        Tap tombol <strong className="underline">Bagikan / Share</strong> di bawah layar Safari Anda, lalu gulir dan pilih <strong className="underline">Tambah ke Layar Utama / Add to Home Screen</strong> untuk tampilan penuh & bersih.
                                    </p>
                                </div>
                                <div className="bg-white/15 px-3 py-2 rounded-xl text-xs flex items-center gap-2 font-medium">
                                    <svg className="w-5 h-5 text-amber-300 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                                    Beri nama aplikasi 'REZEKI 2026' untuk akses instan di Home Screen!
                                </div>
                            </div>
                        )}

                        {/* TAB 1: DASHBOARD */}
                        {currentTab === 'dashboard' && (
                            <div className="space-y-4">
                                {/* Quick Dashboard Overview Card */}
                                <div className="bg-gradient-to-br from-indigo-900 to-slate-900 text-white p-5 rounded-2xl shadow-xl flex flex-col gap-4 relative overflow-hidden">
                                    <div className="absolute right-[-40px] top-[-30px] opacity-10 pointer-events-none">
                                        <svg width="200" height="200" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 22h20L12 2zm0 3.99L19.53 19H4.47L12 5.99z"/></svg>
                                    </div>
                                    <div>
                                        <span className="text-[11px] bg-red-500 font-extrabold tracking-widest uppercase px-2 py-0.5 rounded">UTAMA MINGGU INI</span>
                                        <h3 className="text-lg font-extrabold mt-1 leading-tight">Dapatkan 1 Deal Freelance ATAU 1 Proses Interview Lanjut!</h3>
                                        <p className="text-xs text-gray-300 mt-1">Ingat: Pasar tidak merespon jika tidak menawarkan diri. VOLUME ACTION &gt; ALL!</p>
                                    </div>
                                    <div className="border-t border-white/10 pt-3 flex justify-between items-center text-xs">
                                        <div className="flex items-center gap-1.5">
                                            <span className="w-2.5 h-2.5 rounded-full bg-blue-400"></span>
                                            <span>Freelance 60% (~5 Jam)</span>
                                        </div>
                                        <div className="flex items-center gap-1.5">
                                            <span className="w-2.5 h-2.5 rounded-full bg-emerald-400"></span>
                                            <span>Job Search 30% (~2.5 Jam)</span>
                                        </div>
                                        <div className="flex items-center gap-1.5">
                                            <span className="w-2.5 h-2.5 rounded-full bg-amber-400"></span>
                                            <span>Amiraya 10% (~1 Jam)</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Minimum Success Criteria Checklist & Target Bar */}
                                <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-extrabold text-base text-gray-900 flex items-center gap-2">
                                            <svg className="w-5 h-5 text-amber-500" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                                            Kriteria Sukses Minimum (Mingguan)
                                        </h3>
                                        <span className="text-xs text-gray-500 font-semibold">Progress Live</span>
                                    </div>
                                    
                                    <div className="space-y-4">
                                        {/* Outreach Tracker */}
                                        <div>
                                            <div className="flex justify-between text-xs mb-1 font-semibold">
                                                <span className="text-gray-700">100 Outreach Freelance</span>
                                                <span className={`${cumulative.outreach >= 100 ? 'text-emerald-600 font-extrabold' : 'text-blue-600'}`}>{cumulative.outreach} / 100</span>
                                            </div>
                                            <div className="w-full bg-gray-100 h-2.5 rounded-full overflow-hidden">
                                                <div className="bg-blue-600 h-full rounded-full transition-all duration-500" style={{ width: `${Math.min((cumulative.outreach / 100) * 100, 100)}%` }}></div>
                                            </div>
                                        </div>

                                        {/* Lamaran Tracker */}
                                        <div>
                                            <div className="flex justify-between text-xs mb-1 font-semibold">
                                                <span className="text-gray-700">50 Lamaran Kerja Terkirim</span>
                                                <span className={`${cumulative.lamaran >= 50 ? 'text-emerald-600 font-extrabold' : 'text-blue-600'}`}>{cumulative.lamaran} / 50</span>
                                            </div>
                                            <div className="w-full bg-gray-100 h-2.5 rounded-full overflow-hidden">
                                                <div className="bg-emerald-500 h-full rounded-full transition-all duration-500" style={{ width: `${Math.min((cumulative.lamaran / 50) * 100, 100)}%` }}></div>
                                            </div>
                                        </div>

                                        {/* Meeting Tracker */}
                                        <div>

                        )}

                        {/* TAB 4: TIMER */}
                        {currentTab === 'timer' && (
                            <div className="space-y-4">
                                <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 flex flex-col items-center justify-center text-center">
                                    <span className="text-[11px] font-bold uppercase bg-red-100 text-red-600 px-3 py-1 rounded-full tracking-wider animate-pulse mb-3">FOCUS STOPWATCH</span>
                                    <h2 className="text-lg font-extrabold text-gray-950">Stopwatch Alokasi Waktu</h2>
                                    <p className="text-xs text-gray-500 mt-1 max-w-[280px]">Bekerja di latar belakang. Aman meski layar terkunci atau aplikasi ditutup!</p>
                                    
                                    {/* Big Apple Watch style Counter */}
                                    <div className="my-6 text-4xl font-black font-mono tracking-tight text-gray-900 bg-[#F2F2F7] px-8 py-5 rounded-3xl border border-gray-100 w-full max-w-[260px] shadow-inner text-center">
                                        {formatTime(getLiveSeconds(timerState.activeType))}
                                    </div>

                                    {/* Timer Controls Row */}
                                    <div className="flex gap-3 justify-center w-full">
                                        <button 
                                            onClick={() => {
                                                if (timerState.isRunning) {
                                                    pauseTimer();
                                                } else {
                                                    startTimer();
                                                }
                                            }}
                                            className={`flex-1 py-3 px-4 rounded-xl text-xs font-extrabold shadow-sm transition-all active:scale-95 text-white ${
                                                timerState.isRunning ? 'bg-red-500 hover:bg-red-600' : 'bg-blue-600 hover:bg-blue-700'
                                            }`}
                                        >
                                            {timerState.isRunning ? "Jeda Fokus" : "Mulai Fokus"}
                                        </button>
                                        <button 
                                            onClick={resetTimer}
                                            className="bg-gray-100 hover:bg-gray-200 text-gray-700 py-3 px-5 rounded-xl text-xs font-bold transition-all active:scale-95"
                                        >
                                            Reset
                                        </button>
                                    </div>
                                </div>

                                {/* Task selection cards for Timer */}
                                <div className="space-y-3">
                                    <h3 className="font-extrabold text-xs uppercase text-gray-500 tracking-wider px-1">Pilih Kategori Fokus</h3>
                                    
                                    <div className="grid grid-cols-1 gap-2.5">
                                        {/* Freelance Timer Picker */}
                                        <div 
                                            onClick={() => changeTimerType('freelance')}
                                            className={`p-4 rounded-xl border transition-all cursor-pointer ${
                                                timerState.activeType === 'freelance' 
                                                ? 'bg-blue-50/50 border-blue-500 ring-2 ring-blue-500/10' 
                                                : 'bg-white border-gray-100 hover:bg-gray-50'
                                            }`}
                                        >
                                            <div className="flex justify-between items-center">
                                                <div className="flex items-center gap-2">
                                                    <span className="w-3 h-3 rounded-full bg-blue-600"></span>
                                                    <span className="text-xs font-extrabold text-gray-900 uppercase">Freelance (60%)</span>
                                                </div>
                                                <span className="text-[10px] text-gray-500 font-bold">Target: 5 Jam</span>
                                            </div>
                                            <div className="flex justify-between items-end mt-3">
                                                <span className="text-xs text-gray-400">Total akumulasi</span>
                                                <span className="text-sm font-extrabold font-mono text-blue-600">{formatTime(getLiveSeconds('freelance'))}</span>
                                            </div>
                                        </div>

                                        {/* Job Search Timer Picker */}
                                        <div 
                                            onClick={() => changeTimerType('jobsearch')}
                                            className={`p-4 rounded-xl border transition-all cursor-pointer ${
                                                timerState.activeType === 'jobsearch' 
                                                ? 'bg-emerald-50/50 border-emerald-500 ring-2 ring-emerald-500/10' 
                                                : 'bg-white border-gray-100 hover:bg-gray-50'
                                            }`}
                                        >
                                            <div className="flex justify-between items-center">
                                                <div className="flex items-center gap-2">
                                                    <span className="w-3 h-3 rounded-full bg-emerald-500"></span>
                                                    <span className="text-xs font-extrabold text-gray-900 uppercase">Job Search (30%)</span>
                                                </div>
                                                <span className="text-[10px] text-gray-500 font-bold">Target: 2.5 Jam</span>
                                            </div>
                                            <div className="flex justify-between items-end mt-3">
                                                <span className="text-xs text-gray-400">Total akumulasi</span>
                                                <span className="text-sm font-extrabold font-mono text-emerald-600">{formatTime(getLiveSeconds('jobsearch'))}</span>
                                            </div>
                                        </div>

                                        {/* Amiraya Timer Picker */}
                                        <div 
                                            onClick={() => changeTimerType('amiraya')}
                                            className={`p-4 rounded-xl border transition-all cursor-pointer ${
                                                timerState.activeType === 'amiraya' 
                                                ? 'bg-amber-50/50 border-amber-500 ring-2 ring-amber-500/10' 
                                                : 'bg-white border-gray-100 hover:bg-gray-50'
                                            }`}
                                        >
                                            <div className="flex justify-between items-center">
                                                <div className="flex items-center gap-2">
                                                    <span className="w-3 h-3 rounded-full bg-amber-500"></span>
                                                    <span className="text-xs font-extrabold text-gray-900 uppercase">Amiraya (10%)</span>
                                                </div>
                                                <span className="text-[10px] text-gray-500 font-bold">Target: 0.5 - 1 Jam</span>
                                            </div>
                                            <div className="flex justify-between items-end mt-3">
                                                <span className="text-xs text-gray-400">Total akumulasi</span>
                                                <span className="text-sm font-extrabold font-mono text-amber-500">{formatTime(getLiveSeconds('amiraya'))}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 5: RULES */}
                        {currentTab === 'rules' && (
                            <div className="space-y-4">
                                <div className="bg-gradient-to-br from-red-600 to-rose-700 text-white rounded-2xl p-5 shadow-lg relative overflow-hidden">
                                    <div className="absolute right-[-20px] top-[-10px] opacity-10 pointer-events-none">
                                        <svg width="120" height="120" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                                    </div>
                                    <h3 className="text-sm font-black uppercase tracking-widest bg-white/20 inline-block px-2.5 py-0.5 rounded mb-2">PENTING!</h3>
                                    <h2 className="text-xl font-black">7 ATURAN WAJIB MINGGU INI</h2>
                                    <p className="text-xs text-rose-100 mt-1 leading-relaxed">Penyimpangan dari aturan ini akan merusak fokus Anda mendapatkan cashflow secepatnya.</p>
                                </div>

                                {/* Rules detail listing */}
                                <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 space-y-4">
                                    <h3 className="text-xs font-extrabold text-red-600 uppercase tracking-widest flex items-center gap-1.5">
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path>
                                        </svg>
                                        Jangan Lakukan Hal Ini:
                                    </h3>
                                    <div className="space-y-3">
                                        {PLAN_DATA.rules.map((rule, idx) => (
                                            <div key={idx} className="flex items-start gap-3 bg-red-50/40 p-3 rounded-xl border border-red-100/30">
                                                <div className="mt-0.5 w-4 h-4 rounded-full bg-red-500 text-white flex items-center justify-center text-[10px] font-black shrink-0">
                                                    ✕
                                                </div>
                                                <span className="text-xs text-gray-800 font-bold leading-tight">{rule}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="p-3 bg-amber-50 rounded-xl border border-amber-100/60 mt-4 text-center">
                                        <p className="text-xs text-amber-950 font-bold">FOKUS UTAMA = ACTION YANG MENGHASILKAN UANG!</p>
                                    </div>
                                </div>

                                {/* Reset button */}
                                <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center justify-between">
                                    <div>
                                        <h4 className="font-extrabold text-xs text-red-600 uppercase">Setel Ulang Aplikasi</h4>
                                        <p className="text-[10px] text-gray-500">Menghapus semua progres & data tersimpan</p>
                                    </div>
                                    <button 
                                        onClick={() => {
                                            localStorage.removeItem('rezeki_2026_tasks');
                                            localStorage.removeItem('rezeki_2026_outputs');
                                            localStorage.removeItem('rezeki_2026_metrics_v2');
                                            localStorage.removeItem('rezeki_2026_timer_state_v3');
                                            window.location.reload();
                                        }} 
                                        className="bg-red-50 text-red-600 hover:bg-red-100 px-3 py-2 rounded-xl text-xs font-bold transition-all"
                                    >
                                        Reset Data
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Sticky Modern iOS Bottom Tab Navigation Bar */}
                    <nav className="bg-white/95 backdrop-blur-lg border-t border-gray-200 fixed bottom-0 left-0 right-0 z-50 px-4 py-2 flex justify-between items-center safe-bottom shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
                        <button 
                            onClick={() => setCurrentTab('dashboard')} 
                            className={`flex-1 flex flex-col items-center justify-center py-1 transition-all ${currentTab === 'dashboard' ? 'text-blue-600 scale-105' : 'text-gray-400 hover:text-gray-600'}`}
                        >
                            <svg className="w-5.5 h-5.5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22" height="22">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                            </svg>
                            <span className="text-[10px] font-bold">Dashboard</span>
                        </button>
                        
                        <button 
                            onClick={() => setCurrentTab('planner')} 
                            className={`flex-1 flex flex-col items-center justify-center py-1 transition-all ${currentTab === 'planner' ? 'text-blue-600 scale-105' : 'text-gray-400 hover:text-gray-600'}`}
                        >
                            <svg className="w-5.5 h-5.5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22" height="22">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                            <span className="text-[10px] font-bold">7 Hari</span>
                        </button>

                        <button 
                            onClick={() => setCurrentTab('metrics')} 
                            className={`flex-1 flex flex-col items-center justify-center py-1 transition-all ${currentTab === 'metrics' ? 'text-blue-600 scale-105' : 'text-gray-400 hover:text-gray-600'}`}
                        >
                            <svg className="w-5.5 h-5.5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22" height="22">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path>
                            </svg>
                            <span className="text-[10px] font-bold">Metrik</span>
                        </button>

                        <button 
                            onClick={() => setCurrentTab('timer')} 
                            className={`flex-1 flex flex-col items-center justify-center py-1 transition-all ${currentTab === 'timer' ? 'text-blue-600 scale-105' : 'text-gray-400 hover:text-gray-600'}`}
                        >
                            <svg className="w-5.5 h-5.5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22" height="22">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <span className="text-[10px] font-bold">Timer</span>
                        </button>

                        <button 
                            onClick={() => setCurrentTab('rules')} 
                            className={`flex-1 flex flex-col items-center justify-center py-1 transition-all ${currentTab === 'rules' ? 'text-blue-600 scale-105' : 'text-gray-400 hover:text-gray-600'}`}
                        >
                            <svg className="w-5.5 h-5.5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22" height="22">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                            </svg>
                            <span className="text-[10px] font-bold">Aturan</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
